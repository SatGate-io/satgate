# SatGate Cloud - Dashboard
# Next.js frontend for Cloud UI

app = "satgate-cloud-dashboard"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

# Build-time env vars:
# NEXT_PUBLIC_API_URL - Control plane API URL (e.g., https://satgate-cloud-control.fly.dev)
#
# Note: For same-origin cookie auth, consider:
# - Serving dashboard at cloud.satgate.io
# - Proxying /api/* to control plane

