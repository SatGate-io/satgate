version: '3.8'

# SatGate Cloud - Local Development Stack
# Run: docker-compose up

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: satgate
      POSTGRES_USER: satgate
      POSTGRES_PASSWORD: satgate_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satgate"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Control Plane (API)
  control-plane:
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://satgate:satgate_dev@postgres:5432/satgate
      SECRETS_ENCRYPTION_KEY: dev_encryption_key_32_chars_long!
      DATA_PLANE_URL: http://data-plane:8080
      DATA_PLANE_INTERNAL_TOKEN: dev_internal_token_for_testing
      APP_URL: http://localhost:3000
      # Email (use ethereal.email for dev)
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_USER: # Set your ethereal user
      SMTP_PASS: # Set your ethereal pass
      EMAIL_FROM: noreply@satgate.local
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Data Plane (Gateway)
  data-plane:
    build:
      context: .
      dockerfile: apps/data-plane/Dockerfile
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://satgate:satgate_dev@postgres:5432/satgate
      SECRETS_ENCRYPTION_KEY: dev_encryption_key_32_chars_long!
      INTERNAL_AUTH_TOKEN: dev_internal_token_for_testing
      L402_ROOT_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      LIGHTNING_ENABLED: "false"  # Use mock for local dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Dashboard (Next.js)
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - control-plane

volumes:
  postgres_data:

